
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Media System</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    <style>
        :root { --bg: #f8f9fa; --panel: #ffffff; --text: #212529; --accent: #6c757d; --border: #dee2e6; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .system-frame { width: 100%; max-width: 600px; padding: 40px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); text-align: center; }
        
        .status-label { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 20px; }
        
        /* Minimalist Progress */
        .progress-container { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin: 30px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s ease; }
        
        .info-text { font-size: 14px; color: #495057; height: 20px; }
        
        audio { width: 100%; margin-top: 20px; display: none; }
        
        /* Hidden UI elements for the automated test */
        #media-output { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="system-frame">
    <div class="status-label">Axiom Media // Automated Processing</div>
    
    <div id="info" class="info-text">Initializing Engine...</div>
    
    <div class="progress-container">
        <div id="progress" class="progress-fill"></div>
    </div>

    <div id="media-output">
        <div style="font-size: 13px; margin-bottom: 10px; color: #6c757d;">EXTRACTED AUDIO: MISS KITTIN - 1982</div>
        <audio id="audioPlayer" controls></audio>
    </div>
</div>

<script type="module">
    import init from './pkg/axiom_media.js';
    
    const { FFmpeg } = FFmpegWasm;
    const { fetchFile } = FFmpegUtil;
    
    const log = (msg, p) => {
        document.getElementById('info').innerText = msg;
        document.getElementById('progress').style.width = p + "%";
    };

    async function runTest() {
        await init();
        const ffmpeg = new FFmpeg();
        
        // 1. Fetching via a specialized YouTube-friendly bridge
        log("CONNECTING TO SOURCE...", 20);
        
        try {
            // Using a public Cobalt instance for the bridge (Reliable for YT media streams)
            const response = await fetch("https://co.wuk.sh/api/json", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify({ url: "https://www.youtube.com/watch?v=2hs1wwuwc5I", downloadMode: "audio" })
            });
            
            const data = await response.json();
            if(!data.url) throw new Error("Bridge refused stream");

            log("INGESTING MEDIA STREAM...", 40);
            const mediaBlob = await fetch(data.url).then(r => r.blob());
            
            log("CONVERTING TO MP3...", 70);
            if(!ffmpeg.loaded) await ffmpeg.load();
            await ffmpeg.writeFile('input', await fetchFile(mediaBlob));
            
            // Standardizing to high-quality MP3
            await ffmpeg.exec(['-i', 'input', '-b:a', '192k', 'output.mp3']);
            const audioData = await ffmpeg.readFile('output.mp3');
            
            // Playback
            const audioUrl = URL.createObjectURL(new Blob([audioData.buffer], { type: 'audio/mp3' }));
            const player = document.getElementById('audioPlayer');
            player.src = audioUrl;
            
            document.getElementById('media-output').style.display = 'block';
            log("SYSTEM_READY // PLAYING", 100);
            player.play();

        } catch (err) {
            log("SOURCE_CONNECTION_ERROR", 0);
            console.error(err);
        }
    }

    runTest();
</script>
</body>
</html>
