
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Media</title>
    <style>
        :root { --slate: #1a1c1e; --neutral-grey: #2d2f31; --border: #3f4144; --text: #e1e3e5; --accent: #90a4ae; }
        body { background: var(--slate); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .workspace { width: 100%; max-width: 900px; padding: 40px 20px; box-sizing: border-box; }
        
        /* Neutral Header */
        .header { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        .title { font-size: 14px; font-weight: 600; letter-spacing: 2px; color: var(--accent); }
        .status-dot { font-size: 10px; color: #666; text-transform: uppercase; }

        /* Professional Player Area */
        .viewer-container { width: 100%; background: #000; border-radius: 4px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.4); margin-bottom: 30px; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; outline: none; }

        /* Library List (Neutral Slate) */
        .library-shelf { width: 100%; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--neutral-grey); border: 1px solid var(--border); margin-bottom: 8px; border-radius: 4px; transition: background 0.2s; }
        .item:hover { background: #37393b; }
        .item-info { font-size: 13px; }
        .item-meta { font-size: 11px; color: #777; margin-top: 4px; }
        
        /* Control Buttons */
        .action-area { display: flex; gap: 8px; }
        .btn { padding: 6px 14px; font-size: 11px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border); background: var(--slate); color: var(--text); text-transform: uppercase; transition: all 0.2s; }
        .btn:hover { background: var(--accent); color: var(--slate); border-color: var(--accent); }
        
        /* Auto-Loader Progress */
        .load-bar { position: fixed; top: 0; left: 0; height: 2px; width: 0%; background: var(--accent); transition: width 0.4s; }
    </style>
</head>
<body>

<div class="load-bar" id="loadBar"></div>

<div class="workspace">
    <div class="header">
        <div class="title">AXIOM_MEDIA // VFS_SUBSTRATE</div>
        <div class="status-dot" id="sysStatus">Initializing...</div>
    </div>

    <div class="viewer-container">
        <video id="mainPlayer" controls playsinline muted></video>
    </div>

    <div class="library-shelf">
        <div id="fileList"></div>
    </div>
</div>

<script type="module">
    const worker = new Worker('vfs_worker.js');
    const player = document.getElementById('mainPlayer');
    const sysStatus = document.getElementById('sysStatus');
    const loadBar = document.getElementById('loadBar');
    const TEST_URL = "https://download.samplelib.com/mp4/sample-5s.mp4";

    function updateStatus(msg, progress) {
        sysStatus.innerText = msg;
        if(progress) loadBar.style.width = progress + "%";
    }

    worker.onmessage = async (e) => {
        if (e.data.type === "LIBRARY_LIST") {
            renderLibrary(e.data.files);
        }
        if (e.data.type === "SYNC_COMPLETE") {
            updateStatus("VFS_SYNC_READY", 100);
            setTimeout(() => loadBar.style.width = "0%", 1000);
            autoPlay(e.data.name);
            refresh();
        }
        if (e.data.type === "DELETE_COMPLETE") refresh();
    };

    async function autoPlay(name) {
        const root = await navigator.storage.getDirectory();
        const handle = await root.getFileHandle(name);
        const file = await handle.getFile();
        player.src = URL.createObjectURL(file);
        player.muted = false; // Unmute for test if browser allows
        player.play().catch(err => console.log("Autoplay waiting for interaction"));
    }

    function renderLibrary(files) {
        const container = document.getElementById('fileList');
        container.innerHTML = files.length ? "" : "<div style='color:#555; font-size:12px;'>VFS EMPTY</div>";
        files.forEach(file => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="item-info">
                    <div>${file.name}</div>
                    <div class="item-meta">${(file.size/1024/1024).toFixed(2)} MB // RAW_DATA</div>
                </div>
                <div class="action-area">
                    <button class="btn" onclick="playNative('${file.name}')">Stream</button>
                    <button class="btn" onclick="remove('${file.name}')">Purge</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    window.playNative = async (name) => { autoPlay(name); };
    window.remove = (name) => { worker.postMessage({ type: "DELETE", name }); };
    function refresh() { worker.postMessage({ type: "LIST" }); }

    // AUTO-INGEST LOGIC
    async function initAxiom() {
        updateStatus("POLLING_REMOTE", 10);
        try {
            const resp = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(TEST_URL));
            updateStatus("STREAM_INGEST", 40);
            const blob = await resp.blob();
            updateStatus("WRITING_VFS", 70);
            worker.postMessage({ 
                type: "WRITE", 
                name: "test_auto_capture.mp4", 
                payload: await blob.arrayBuffer() 
            });
        } catch(e) {
            updateStatus("SOURCE_OFFLINE", 0);
        }
    }

    // Kick off
    refresh();
    initAxiom();
</script>
</body>
</html>
